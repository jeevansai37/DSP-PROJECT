{% extends "base.html" %}

{% block title %}Settings · Secure Healthcare{% endblock %}

{% block content %}
<div class="page-heading">
  <div class="page-heading-title">
    <div class="page-heading-icon">
      <i class="fa-solid fa-gear"></i>
    </div>
    <div>
      <h1>Settings</h1>
      <div class="text-muted small">
        Personal and security preferences for your console.
      </div>
    </div>
  </div>
</div>

<div class="row g-3 g-lg-4">
  <div class="col-12 col-lg-6">
    <div class="card border-0 shadow-sm mb-3">
      <div class="card-body">
        <h2 class="h6 mb-3">Profile</h2>
        <form class="small">
          <div class="mb-2">
            <label class="form-label">Name</label>
            <input
              type="text"
              class="form-control form-control-sm"
              value="{{ session.get('username') }}"
              disabled
            />
          </div>
          <div class="mb-2">
            <label class="form-label">Role</label>
            <input
              type="text"
              class="form-control form-control-sm"
              value="{{ session.get('user_role')|capitalize }}"
              disabled
            />
          </div>
        </form>
      </div>
    </div>

    <div class="card border-0 shadow-sm mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h6 mb-0">Change Password</h2>
          <button class="btn btn-sm btn-outline-primary" type="button" data-bs-toggle="collapse" data-bs-target="#collapsePasswordForm" aria-expanded="false" aria-controls="collapsePasswordForm">
            Update Password
          </button>
        </div>
        <div class="collapse" id="collapsePasswordForm">
          <form action="{{ url_for('settings') }}" method="POST" class="small border-top pt-3">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-2">
              <label class="form-label" for="current_password">Current Password</label>
              <input
                type="password"
                class="form-control form-control-sm"
                id="current_password"
                name="current_password"
                required
              />
            </div>
            <div class="mb-2">
              <label class="form-label" for="new_password">New Password</label>
              <input
                type="password"
                class="form-control form-control-sm"
                id="new_password"
                name="new_password"
                required
              />
              <div class="form-text mt-1" style="font-size: 0.7rem;">
                Must have 8+ chars, uppercase, number, and special character.
              </div>
            </div>
            <div class="mb-2">
              <label class="form-label" for="confirm_password">Confirm New Password</label>
              <input
                type="password"
                class="form-control form-control-sm"
                id="confirm_password"
                name="confirm_password"
                required
              />
            </div>
            <div class="mt-3">
              <button type="submit" class="btn btn-sm btn-primary">Save Password</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="col-12 col-lg-6">
    <div class="card border-0 shadow-sm mb-3">
      <div class="card-body">
        <h2 class="h6 mb-3">Session security</h2>
        <form class="small">

          <div class="form-check form-switch mb-2">
            <input
              class="form-check-input"
              type="checkbox"
              id="sessionTimeout"
              checked
              disabled
            />
            <label class="form-check-label" for="sessionTimeout">
              Auto‑expire idle sessions
            </label>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
