{% extends "base.html" %}

{% block title %}Sign in · Secure Healthcare{% endblock %}

{% block extra_head %}
<style>
  /* Premium Login Styles */
  .login-wrapper {
    position: relative;
    overflow: hidden;
    background: radial-gradient(circle at top right, #eef2f8, #f8faff);
  }

  .bg-shape {
    position: absolute;
    filter: blur(80px);
    z-index: 0;
    opacity: 0.6;
    animation: float 10s ease-in-out infinite alternate;
  }

  .bg-shape-1 {
    width: 400px;
    height: 400px;
    background: linear-gradient(135deg, rgba(13,110,253,0.3), rgba(32,201,151,0.2));
    border-radius: 50%;
    top: -100px;
    right: -100px;
  }

  .bg-shape-2 {
    width: 300px;
    height: 300px;
    background: linear-gradient(135deg, rgba(32,201,151,0.2), rgba(13,110,253,0.2));
    border-radius: 50%;
    bottom: -50px;
    left: -50px;
    animation-delay: -5s;
  }

  @keyframes float {
    0% { transform: translate(0, 0) rotate(0deg) scale(1); }
    100% { transform: translate(-30px, 30px) rotate(15deg) scale(1.05); }
  }

  .logo-container {
    width: 72px;
    height: 72px;
    background: linear-gradient(145deg, #ffffff, #f0f4f8);
    color: var(--hospital-primary);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 25px rgba(13,110,253,0.15), inset 0 2px 4px rgba(255,255,255,0.8);
    position: relative;
  }

  .logo-container::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 22px;
    background: linear-gradient(135deg, rgba(13,110,253,0.3), rgba(32,201,151,0.3));
    z-index: -1;
    filter: blur(8px);
  }

  .text-gradient {
    background: linear-gradient(120deg, #061b3a, #0d6efd);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .glass-card {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.4) !important;
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.8) !important;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .glass-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 25px 50px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.8) !important;
  }

  .form-group-custom {
    position: relative;
  }

  .custom-input {
    background: rgba(255, 255, 255, 0.9) !important;
    border: 1px solid rgba(200, 210, 224, 0.6) !important;
    border-radius: 12px !important;
    padding: 1rem 1.25rem;
    padding-top: 1.625rem;
    padding-bottom: 0.625rem;
    transition: all 0.3s ease;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
  }

  .custom-input:focus {
    background: #ffffff !important;
    border-color: rgba(13,110,253,0.4) !important;
    box-shadow: 0 0 0 4px rgba(13,110,253,0.1), inset 0 2px 4px rgba(0,0,0,0.02) !important;
    transform: translateY(-1px);
  }

  .input-glow {
    position: absolute;
    bottom: -1px;
    left: 10%;
    right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--hospital-primary), transparent);
    opacity: 0;
    transition: opacity 0.3s ease;
    border-radius: 2px;
  }

  .custom-input:focus ~ .input-glow {
    opacity: 1;
  }

  .form-floating > label {
    padding-left: 1.25rem;
    color: #6c757d;
  }

  .form-floating > .custom-input:focus ~ label,
  .form-floating > .custom-input:not(:placeholder-shown) ~ label {
    transform: scale(0.85) translateY(-0.75rem) translateX(0.15rem);
    color: var(--hospital-primary);
  }

  .form-floating > .custom-input:focus ~ label i {
    color: var(--hospital-primary) !important;
  }

  .btn-premium {
    background: linear-gradient(135deg, #0d6efd, #1b62ff);
    border: none;
    border-radius: 12px;
    color: white;
    overflow: hidden;
    position: relative;
    z-index: 1;
    box-shadow: 0 8px 16px rgba(13,110,253,0.25);
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  .btn-premium::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #1b62ff, #0a58ca);
    z-index: -1;
    transition: opacity 0.3s ease;
    opacity: 0;
  }

  .btn-premium:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(13,110,253,0.35);
    color: white;
  }

  .btn-premium:hover::before {
    opacity: 1;
  }

  .btn-premium:active {
    transform: translateY(1px);
    box-shadow: 0 4px 8px rgba(13,110,253,0.2);
  }

  .custom-checkbox .form-check-input {
    width: 1.1em;
    height: 1.1em;
    border-radius: 4px;
    border: 1px solid rgba(13,110,253,0.3);
  }

  .custom-checkbox .form-check-input:checked {
    background-color: var(--hospital-primary);
    border-color: var(--hospital-primary);
    box-shadow: 0 2px 6px rgba(13,110,253,0.3);
  }

  .demo-accounts-card {
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(10px);
    border: 1px dashed rgba(200, 210, 224, 0.8);
    transition: all 0.3s ease;
  }

  .demo-accounts-card:hover {
    background: rgba(255, 255, 255, 0.8);
    border-color: rgba(13,110,253,0.3);
  }

  .demo-row {
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.4);
    transition: background 0.2s ease;
  }
  
  .demo-row:hover {
    background: rgba(255, 255, 255, 0.9);
  }

  .tracking-wide {
    letter-spacing: 0.05em;
  }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100 login-wrapper">
  
  <!-- Decorative Background Elements -->
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <div class="col-12 col-md-8 col-lg-6 col-xl-4 position-relative z-1" style="max-width: 440px;">
    
    <div class="text-center mb-4 login-header">
      <div class="logo-container mx-auto mb-3">
        <i class="fa-solid fa-shield-heart fs-3"></i>
      </div>
      <h1 class="h3 fw-bold mb-1 text-gradient">SecureCare Access</h1>
      <p class="text-secondary small mb-0">
        Sign in with your doctor or admin credentials
      </p>
    </div>

    <div class="card glass-card border-0 shadow-lg mb-4">
      <div class="card-body p-4 p-sm-5">
        <form method="POST" novalidate id="loginForm">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          
          <div class="form-floating mb-4 form-group-custom">
            <input
              type="text"
              class="form-control custom-input"
              id="username"
              name="username"
              placeholder="Username"
              required
              autocomplete="username"
            />
            <label for="username"><i class="fa-regular fa-user me-2 text-muted"></i>Username</label>
            <div class="input-glow"></div>
          </div>

          <div class="form-floating mb-4 form-group-custom">
            <input
              type="password"
              class="form-control custom-input"
              id="password"
              name="password"
              placeholder="Password"
              required
              autocomplete="current-password"
            />
            <label for="password"><i class="fa-solid fa-key me-2 text-muted"></i>Password</label>
            <div class="input-glow"></div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check custom-checkbox small">
              <input
                class="form-check-input"
                type="checkbox"
                value=""
                id="remember"
                checked
                disabled
              />
              <label class="form-check-label text-muted user-select-none" for="remember">
                Enforced secure session
              </label>
            </div>
          </div>

          <button type="submit" class="btn btn-premium w-100 py-3 fw-semibold">
            <span>Sign in securely</span>
            <i class="fa-solid fa-right-to-bracket ms-2"></i>
          </button>
        </form>
      </div>
    </div>

  </div>

    <!-- Sign Up link -->
    <div class="text-center mt-2 position-relative z-1">
      <p class="text-secondary small">
        New administrator?
        <a href="{{ url_for('signup') }}" class="text-primary fw-semibold text-decoration-none">
          Register here <i class="fa-solid fa-arrow-right ms-1"></i>
        </a>
      </p>
    </div>

</div>
{% endblock %}
